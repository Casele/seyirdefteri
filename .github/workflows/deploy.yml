name: Deploy Seyir Defteri

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into HTML
        run: |
          sed -i "s|__FB_API_KEY__|${{ secrets.FB_API_KEY }}|g"         index.html
          sed -i "s|__FB_AUTH_DOMAIN__|${{ secrets.FB_AUTH_DOMAIN }}|g" index.html
          sed -i "s|__FB_DB_URL__|${{ secrets.FB_DB_URL }}|g"           index.html
          sed -i "s|__FB_PROJECT_ID__|${{ secrets.FB_PROJECT_ID }}|g"   index.html
          sed -i "s|__FB_STORAGE_BUCKET__|${{ secrets.FB_STORAGE_BUCKET }}|g" index.html
          sed -i "s|__FB_MSG_ID__|${{ secrets.FB_MSG_ID }}|g"           index.html
          sed -i "s|__FB_APP_ID__|${{ secrets.FB_APP_ID }}|g"           index.html
          sed -i "s|__ACCESS_PIN__|${{ secrets.ACCESS_PIN }}|g"         index.html
          sed -i "s|__TMDB_KEY__|${{ secrets.TMDB_KEY }}|g"             index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,*.yml,*.md'
